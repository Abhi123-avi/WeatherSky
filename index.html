<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSky</title>

    <!-- Tailwind minimal utilities only -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="default-bg">

    <!-- WeatherSky Main Layout Structure -->

    <!-- HEADER -->
    <header class="text-center p-6">
        <h1 class="abhiHeader">WeatherSky</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main class="mx-auto p-4">

        <!-- SEARCH SECTION -->
        <section>

            <div class="abhiSearchBox">

                <!-- City Input -->
                <input type="text" placeholder="Enter city name" class="searchInput">

                <!-- Search Button -->
                <button class="searchBtn abhi5">
                    Search
                </button>

                <!-- Location Button -->
                <button class="locationBtn abhi6">
                    Use Location
                </button>
            </div>

            <!-- Recent Cities -->
            <nav>
                <button class="recentBtn abhi8">
                    Recently Searched
                </button>

                <div class="recentDropdown abhi9"></div>
            </nav>

            <!-- Temperature Toggle -->
            <div class="abhi10 text-center mt-6">
                <button class="toggleTemp abhi11">
                    Show in °F
                </button>
            </div>

            <!-- ERROR BOX -->
            <div class="errorBox abhi12"></div>

        </section>

        <!-- CURRENT WEATHER -->
        <section class="currentWeatherBox abhi13">
            <article>
                <h2 class="cityName abhi14"></h2>
                <p class="temperature abhi15"></p>
                <p class="description abhi16"></p>

                <div class="abhi17">
                    <p class="humidity abhi18"></p>
                    <p class="wind abhi19"></p>
                    <p class="feels abhi20"></p>
                </div>
            </article>
        </section>

        <!-- FORECAST -->
        <section class="abhi21">
            <h2 class="abhiForecastTitle">5-Day Forecast</h2>

            <div class="forecastContainer abhi22 grid gap-4"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="abhi23 text-center p-4">
        Abhinav Kumar WeatherSky © 2026
    </footer>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
